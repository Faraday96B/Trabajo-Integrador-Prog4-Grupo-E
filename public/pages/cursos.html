<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cursos | FCAD Cursos</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
  <header class="topbar">
    <h1>CURSOS</h1>
    <div class="brand" aria-label="Facultad de Ciencias de la Administracion UNER">
      <span class="brand-mark">
        <span class="brand-waves">~~~</span>
        <strong>UNER</strong>
      </span>
      <span class="brand-text">Facultad de Ciencias<br>de la Administracion</span>
    </div>
  </header>

  <div class="dashboard-shell">
    <aside class="sidebar" aria-label="Navegacion principal">
      <nav>
        <a href="dashboard.html">INICIO</a>
        <a href="inscripciones.html">INSCRIPCIONES</a>
        <a href="estudiantes.html">ESTUDIANTES</a>
        <a class="active" href="cursos.html">CURSOS</a>
      </nav>
    </aside>

    <main class="dashboard-main courses-page">
      <h2>Listado de cursos</h2>

      <div class="table-scroll">
        <table class="courses-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Inicio</th>
              <th>Horas</th>
              <th>Max. Inscriptos</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="coursesTableBody"></tbody>
        </table>
      </div>

      <div class="formulario">
        <h3> Agregar curso </h3>
        <form>

          <input type="hidden" id="cursoId">

          <div class="campo">
            <label for="nombre">Nombre del curso</label>
            <input type="text" id="nombre" required>
          </div>

          <div class="campo">
            <label for="inicio">Fecha de inicio</label>
            <input type="date" id="inicio" required>
          </div>

          <div class="campo">
            <label for="horas">Cantidad de horas</label>
            <input type="number" id="horas" required>
          </div>

          <div class="campo">
            <label for="maxinscripto">Máx. inscriptos</label>
            <input type="number" id="maxinscripto" required>
          </div>

          <div class="campo">
            <label for="estado">Estado</label>
            <select id="estado" required>
              <option value="">Seleccionar estado</option>
              <option value="Activo">Activo</option>
              <option value="Finalizado">Finalizado</option>
            </select>
          </div> 

          <button type="submit">Agregar</button>

        </form>
      </div>
      <div class="diploma"> 
        <button type="submit"> Diploma 

        </button>
      </div>

    </main>
  </div>

  <script src="../js/cursos.js"></script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cursos | FCAD Cursos</title>
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="admin-dashboard courses-admin-page">
  <div class="admin-shell">
    <aside class="admin-sidebar" aria-label="Navegacion principal">
      <a class="admin-brand" href="dashboard.html" aria-label="FCAD UNER - Inicio">
        <span class="admin-brand-logo admin-brand-logo-square" aria-hidden="true">
          <img src="../assets/img/Logo.png" alt="">
        </span>
        <span>
          <strong>FCAD - UNER</strong>
          <small>Sistema de Inscripcion<br>a Cursos</small>
        </span>
      </a>

      <nav class="admin-nav">
        <a class="admin-nav-link" href="dashboard.html">
          <span class="admin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 11.2 12 4l9 7.2v8.3a1.5 1.5 0 0 1-1.5 1.5H15v-6H9v6H4.5A1.5 1.5 0 0 1 3 19.5v-8.3Z"/></svg>
          </span>
          Dashboard
        </a>
        <a class="admin-nav-link" href="estudiantes.html">
          <span class="admin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M8 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm8.5.5a3.25 3.25 0 1 1 0-6.5 3.25 3.25 0 0 1 0 6.5ZM2.5 20.5a5.5 5.5 0 0 1 11 0v.5h-11v-.5Zm11.5.5v-.5a7 7 0 0 0-1.4-4.2 4.75 4.75 0 0 1 8.9 2.3V21H14Z"/></svg>
          </span>
          Estudiantes
        </a>
        <a class="admin-nav-link active" href="cursos.html" aria-current="page">
          <span class="admin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m12 3 10 5-10 5L2 8l10-5Zm-6 8.5 6 3 6-3V16c0 1.7-2.7 4-6 4s-6-2.3-6-4v-4.5Z"/></svg>
          </span>
          Cursos
        </a>
        <a class="admin-nav-link" href="inscripciones.html">
          <span class="admin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 2h10v3h3v17H4V5h3V2Zm2 3h6V4H9v1Zm-2 5v2h10v-2H7Zm0 4v2h10v-2H7Z"/></svg>
          </span>
          Inscripciones
        </a>
        <a class="admin-nav-link" href="#">
          <span class="admin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm-8 9a8 8 0 1 1 16 0H4Z"/></svg>
          </span>
          Usuarios
        </a>
        <a class="admin-nav-link admin-logout" href="login.html">
          <span class="admin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 3h9v3H7v12h6v3H4V3Zm12.6 4.4 5.1 5.1-5.1 5.1-2.1-2.1 1.5-1.5H10v-3h6l-1.5-1.5 2.1-2.1Z"/></svg>
          </span>
          Cerrar sesion
        </a>
      </nav>
    </aside>

    <div class="admin-content">
      <header class="admin-topbar">
        <div class="ms-auto">
          <button class="admin-user" type="button">
            <span class="admin-avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm-8 9a8 8 0 0 1 16 0H4Z"/></svg>
            </span>
            <span>Admin</span>
          </button>
        </div>
      </header>

      <main class="admin-main courses-admin-main">
        <div class="courses-header">
          <div>
            <h1>Cursos</h1>
            <p>Gestione los cursos</p>
          </div>
          <a class="primary-admin-button" href="curso-form.html">
            <span aria-hidden="true">+</span>
            Nuevo Curso
          </a>
        </div>

        <section class="courses-filter-panel" aria-label="Filtros de cursos">
          <div class="row g-4 align-items-end">
            <div class="col-12 col-lg-4">
              <label class="form-label" for="courseNameFilter">Buscar por nombre</label>
              <input class="form-control admin-control" id="courseNameFilter" type="search" placeholder="Nombre del curso">
            </div>
            <div class="col-12 col-md-6 col-lg-3">
              <label class="form-label" for="courseStatusFilter">Estado</label>
              <select class="form-select admin-control" id="courseStatusFilter">
                <option value="">Todos</option>
                <option value="1">Borrador</option>
                <option value="2">Inscripcion abierta</option>
                <option value="3">Inscripcion cerrada</option>
              </select>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
              <label class="form-label" for="courseEnrollmentFilter">Inscripcion</label>
              <select class="form-select admin-control" id="courseEnrollmentFilter">
                <option value="">Todos</option>
                <option value="con-cupo">Con cupo</option>
                <option value="sin-cupo">Sin cupo</option>
              </select>
            </div>
            <div class="col-6 col-lg-1">
              <button class="secondary-admin-button search-button" id="searchCourses" type="button">Buscar</button>
            </div>
            <div class="col-6 col-lg-1">
              <button class="light-admin-button clear-button" id="clearCourses" type="button">Limpiar</button>
            </div>
          </div>
        </section>

        <section class="courses-table-card" aria-label="Listado de cursos">
          <div class="table-responsive">
            <table class="table admin-list-table align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th>Fecha Inicio</th>
                  <th>Horas</th>
                  <th>Cupo Max.</th>
                  <th>Inscriptos</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="coursesTableBody"></tbody>
            </table>
          </div>

          <nav class="admin-pagination" id="coursesPagination" aria-label="Paginacion de cursos">
            <button id="firstCoursesPage" type="button" aria-label="Primera pagina">«</button>
            <button id="previousCoursesPage" type="button" aria-label="Pagina anterior">‹</button>
            <span class="admin-pagination-pages" id="coursePageNumbers"></span>
            <button id="nextCoursesPage" type="button" aria-label="Pagina siguiente">›</button>
            <button id="lastCoursesPage" type="button" aria-label="Ultima pagina">»</button>
          </nav>

          <p class="courses-results" id="coursesResults">Mostrando 0 resultados</p>
        </section>
      </main>
    </div>
  </div>

  <script src="../bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cursos.js"></script>
</body>
</html>
